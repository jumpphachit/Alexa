<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hangman</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #fffdf8;
  --ink: #1c1c1c;
  --muted: #aaa;
  --border: #e0dbd2;
  --red: #d94f3d;
  --green: #3a9e6f;
  --yellow: #f0c040;
  --surface: #f5f1ea;
  --card: #ffffff;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  font-family: 'DM Mono', monospace;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 32px 16px 48px;
}

h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 3rem;
  letter-spacing: 10px;
  color: var(--ink);
  margin-bottom: 4px;
}
.tagline {
  font-size: 10px;
  letter-spacing: 3px;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 32px;
}

/* ── SCREENS ── */
.screen { width: 100%; max-width: 480px; display: none; flex-direction: column; align-items: center; gap: 20px; }
.screen.active { display: flex; }

/* ── SETUP SCREEN ── */
.setup-card {
  width: 100%;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 28px;
}
.setup-card h2 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.4rem;
  letter-spacing: 4px;
  color: var(--ink);
  margin-bottom: 20px;
}
.field { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
.field label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }
.field input, .field textarea {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 14px;
  font-family: 'DM Mono', monospace;
  font-size: 14px;
  color: var(--ink);
  outline: none;
  transition: border-color 0.2s;
  width: 100%;
}
.field input:focus, .field textarea:focus { border-color: var(--ink); }
.field textarea { resize: vertical; min-height: 80px; }
.field input[type="password"] { letter-spacing: 4px; font-size: 18px; }

.hint-count {
  display: flex; gap: 8px; flex-wrap: wrap;
}
.hint-row {
  display: flex; gap: 8px; align-items: center; width: 100%;
}
.hint-row input { flex: 1; }
.add-hint {
  background: transparent;
  border: 1px dashed var(--border);
  border-radius: 8px;
  padding: 10px;
  color: var(--muted);
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  cursor: pointer;
  width: 100%;
  transition: all 0.2s;
  letter-spacing: 1px;
  margin-top: 4px;
}
.add-hint:hover { border-color: var(--ink); color: var(--ink); }
.remove-hint {
  background: transparent; border: none;
  color: var(--muted); cursor: pointer;
  font-size: 16px; padding: 4px 8px;
  border-radius: 6px;
  transition: color 0.2s;
  flex-shrink: 0;
}
.remove-hint:hover { color: var(--red); }

.btn-main {
  width: 100%;
  padding: 14px;
  background: var(--ink);
  color: var(--bg);
  border: none;
  border-radius: 10px;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.1rem;
  letter-spacing: 4px;
  cursor: pointer;
  transition: opacity 0.2s, transform 0.15s;
  margin-top: 8px;
}
.btn-main:hover { opacity: 0.85; }
.btn-main:active { transform: scale(0.97); }
.btn-main.red { background: var(--red); }
.btn-main.green { background: var(--green); }

/* link box */
.link-box {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.link-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }
.link-url {
  font-size: 12px;
  color: var(--ink);
  word-break: break-all;
  line-height: 1.6;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 12px;
}
.copy-btn {
  padding: 10px;
  background: var(--ink);
  color: var(--bg);
  border: none;
  border-radius: 8px;
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  letter-spacing: 2px;
  cursor: pointer;
  transition: opacity 0.2s;
}
.copy-btn:hover { opacity: 0.8; }
.copy-btn.copied { background: var(--green); }

/* ── GAME SCREEN ── */
.gallows-wrap {
  width: 200px;
  height: 180px;
  position: relative;
}
.gallows-wrap svg { width: 100%; height: 100%; }

/* word blanks */
.word-row {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: center;
}
.blank {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}
.blank-letter {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 2rem;
  color: var(--ink);
  min-width: 32px;
  text-align: center;
  min-height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.3s;
}
.blank-letter.reveal { animation: popLetter 0.3s cubic-bezier(0.34,1.4,0.64,1); }
@keyframes popLetter {
  0% { transform: scale(0.5) translateY(-8px); opacity: 0; }
  100% { transform: scale(1) translateY(0); opacity: 1; }
}
.blank-line {
  width: 32px; height: 2px;
  background: var(--ink);
  border-radius: 2px;
}

/* hints */
.hints-box {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px 20px;
}
.hints-box h3 { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
.hint-item {
  font-size: 13px;
  color: var(--ink);
  padding: 6px 0;
  border-bottom: 1px solid var(--border);
  line-height: 1.5;
}
.hint-item:last-child { border-bottom: none; }
.hint-num { color: var(--muted); margin-right: 8px; }

/* wrong letters */
.wrong-row {
  display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;
  min-height: 32px;
}
.wrong-letter {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.2rem;
  color: var(--red);
  background: #fdf0ee;
  border: 1px solid #f5c5bf;
  border-radius: 6px;
  width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
  animation: popIn 0.25s ease;
}
@keyframes popIn {
  0% { transform: scale(0.5); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}

/* lives */
.lives-row {
  font-size: 11px;
  letter-spacing: 2px;
  color: var(--muted);
  text-transform: uppercase;
}
.lives-row span { color: var(--red); font-weight: 500; }

/* keyboard */
.keyboard {
  display: flex;
  flex-direction: column;
  gap: 6px;
  width: 100%;
  max-width: 380px;
}
.kb-row { display: flex; gap: 5px; justify-content: center; }
.key {
  width: 34px; height: 42px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--card);
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1rem;
  letter-spacing: 1px;
  color: var(--ink);
  cursor: pointer;
  transition: all 0.15s;
  display: flex; align-items: center; justify-content: center;
}
.key:hover:not(:disabled) { background: var(--ink); color: var(--bg); border-color: var(--ink); }
.key:disabled { opacity: 0.2; cursor: default; }
.key.hit { background: var(--green); border-color: var(--green); color: #fff; }
.key.miss { background: var(--surface); border-color: var(--border); color: var(--muted); }

/* result banner */
.result-banner {
  width: 100%;
  border-radius: 12px;
  padding: 20px;
  text-align: center;
  display: none;
}
.result-banner.win { background: #eaf7f1; border: 1px solid var(--green); }
.result-banner.lose { background: #fdf0ee; border: 1px solid var(--red); }
.result-banner h2 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.8rem;
  letter-spacing: 4px;
  margin-bottom: 6px;
}
.result-banner.win h2 { color: var(--green); }
.result-banner.lose h2 { color: var(--red); }
.result-banner p { font-size: 12px; color: var(--muted); letter-spacing: 1px; }

/* share again */
.share-again {
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 1px;
  text-align: center;
  margin-top: -8px;
}
.share-again a { color: var(--ink); text-decoration: underline; cursor: pointer; }
</style>
</head>
<body>

<h1>HANGMAN</h1>
<p class="tagline">set a word · send the link · let them guess</p>

<!-- SETUP SCREEN -->
<div class="screen active" id="screenSetup">
  <div class="setup-card">
    <h2>Create Puzzle</h2>

    <div class="field">
      <label>Secret Word or Phrase</label>
      <input type="password" id="inputWord" placeholder="type your word..." autocomplete="off" oninput="this.value=this.value.toUpperCase()">
    </div>

    <div class="field">
      <label>Hints (optional)</label>
      <div id="hintFields">
        <div class="hint-row">
          <input type="text" placeholder="Hint 1..." class="hint-input">
          <button class="remove-hint" onclick="removeHint(this)">×</button>
        </div>
      </div>
      <button class="add-hint" onclick="addHint()">+ add another hint</button>
    </div>

    <button class="btn-main" onclick="generateLink()">Generate Link ➜</button>
  </div>

  <div class="link-box" id="linkBox" style="display:none">
    <div class="link-label">Send this link to your friend</div>
    <div class="link-url" id="linkUrl"></div>
    <button class="copy-btn" id="copyBtn" onclick="copyLink()">Copy Link</button>
    <div style="font-size:11px;color:var(--muted);letter-spacing:1px;">The word is hidden in the link — your friend won't see it!</div>
  </div>
</div>

<!-- GAME SCREEN -->
<div class="screen" id="screenGame">

  <div class="gallows-wrap">
    <svg viewBox="0 0 200 180" xmlns="http://www.w3.org/2000/svg">
      <!-- gallows structure -->
      <line x1="20" y1="170" x2="180" y2="170" stroke="#1c1c1c" stroke-width="3" stroke-linecap="round"/>
      <line x1="60" y1="170" x2="60" y2="10" stroke="#1c1c1c" stroke-width="3" stroke-linecap="round"/>
      <line x1="60" y1="10" x2="130" y2="10" stroke="#1c1c1c" stroke-width="3" stroke-linecap="round"/>
      <line x1="130" y1="10" x2="130" y2="35" stroke="#1c1c1c" stroke-width="3" stroke-linecap="round"/>
      <!-- hangman parts (hidden by default) -->
      <circle id="p-head" cx="130" cy="50" r="14" stroke="#d94f3d" stroke-width="2.5" fill="none" style="display:none"/>
      <line id="p-body" x1="130" y1="64" x2="130" y2="110" stroke="#d94f3d" stroke-width="2.5" stroke-linecap="round" style="display:none"/>
      <line id="p-larm" x1="130" y1="75" x2="108" y2="95" stroke="#d94f3d" stroke-width="2.5" stroke-linecap="round" style="display:none"/>
      <line id="p-rarm" x1="130" y1="75" x2="152" y2="95" stroke="#d94f3d" stroke-width="2.5" stroke-linecap="round" style="display:none"/>
      <line id="p-lleg" x1="130" y1="110" x2="108" y2="135" stroke="#d94f3d" stroke-width="2.5" stroke-linecap="round" style="display:none"/>
      <line id="p-rleg" x1="130" y1="110" x2="152" y2="135" stroke="#d94f3d" stroke-width="2.5" stroke-linecap="round" style="display:none"/>
    </svg>
  </div>

  <div class="lives-row">Wrong guesses: <span id="livesLeft">0</span> / 6</div>

  <div class="word-row" id="wordRow"></div>

  <div class="wrong-row" id="wrongRow"></div>

  <div class="hints-box" id="hintsBox" style="display:none">
    <h3>Hints</h3>
    <div id="hintsList"></div>
  </div>

  <div class="result-banner" id="resultBanner">
    <h2 id="resultTitle"></h2>
    <p id="resultMsg"></p>
  </div>

  <div class="keyboard" id="keyboard"></div>

  <div class="share-again">want to set a puzzle? <a onclick="goSetup()">create one</a></div>
</div>

<script>
const PARTS = ['p-head','p-body','p-larm','p-rarm','p-lleg','p-rleg'];

// ── SETUP ──
function addHint() {
  const n = document.getElementById('hintFields').children.length + 1;
  const row = document.createElement('div');
  row.className = 'hint-row';
  row.innerHTML = `<input type="text" placeholder="Hint ${n}..." class="hint-input"><button class="remove-hint" onclick="removeHint(this)">×</button>`;
  document.getElementById('hintFields').appendChild(row);
}
function removeHint(btn) {
  const fields = document.getElementById('hintFields');
  if (fields.children.length > 1) btn.parentElement.remove();
}

function generateLink() {
  const word = document.getElementById('inputWord').value.trim().toUpperCase();
  if (!word) { alert('Please enter a word!'); return; }

  const hints = [...document.querySelectorAll('.hint-input')]
    .map(i => i.value.trim()).filter(Boolean);

  const data = { w: word, h: hints };
  const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(data))));
  const url = location.href.split('?')[0] + '?g=' + encoded;

  document.getElementById('linkUrl').textContent = url;
  document.getElementById('linkBox').style.display = 'flex';
  document.getElementById('linkBox').style.flexDirection = 'column';
}

function copyLink() {
  const url = document.getElementById('linkUrl').textContent;
  navigator.clipboard.writeText(url).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy Link'; btn.classList.remove('copied'); }, 2000);
  });
}

// ── GAME ──
let secretWord = '', hints = [], guessed = new Set(), wrong = 0, gameOver = false;

function initGame(word, h) {
  secretWord = word.toUpperCase().replace(/[^A-Z ]/g,'');
  hints = h || [];
  guessed = new Set();
  wrong = 0; gameOver = false;

  document.getElementById('screenSetup').classList.remove('active');
  document.getElementById('screenGame').classList.add('active');

  PARTS.forEach(id => document.getElementById(id).style.display = 'none');
  document.getElementById('wrongRow').innerHTML = '';
  document.getElementById('livesLeft').textContent = '0';
  document.getElementById('resultBanner').style.display = 'none';

  if (hints.length) {
    document.getElementById('hintsBox').style.display = 'block';
    document.getElementById('hintsList').innerHTML = hints.map((h,i) =>
      `<div class="hint-item"><span class="hint-num">${i+1}.</span>${h}</div>`
    ).join('');
  }

  renderWord();
  renderKeyboard();
}

function renderWord() {
  const row = document.getElementById('wordRow');
  row.innerHTML = '';
  for (const ch of secretWord) {
    const blank = document.createElement('div');
    blank.className = 'blank';
    if (ch === ' ') {
      blank.style.width = '20px';
    } else {
      const letter = document.createElement('div');
      letter.className = 'blank-letter';
      if (guessed.has(ch)) { letter.textContent = ch; }
      const line = document.createElement('div');
      line.className = 'blank-line';
      blank.appendChild(letter);
      blank.appendChild(line);
    }
    row.appendChild(blank);
  }
}

function renderKeyboard() {
  const kb = document.getElementById('keyboard');
  kb.innerHTML = '';
  const rows = ['QWERTYUIOP','ASDFGHJKL','ZXCVBNM'];
  rows.forEach(row => {
    const div = document.createElement('div');
    div.className = 'kb-row';
    [...row].forEach(k => {
      const btn = document.createElement('button');
      btn.className = 'key';
      btn.textContent = k;
      btn.id = 'key-' + k;
      if (guessed.has(k)) {
        btn.disabled = true;
        btn.classList.add(secretWord.includes(k) ? 'hit' : 'miss');
      }
      btn.onclick = () => guess(k);
      div.appendChild(btn);
    });
    kb.appendChild(div);
  });
}

function guess(letter) {
  if (gameOver || guessed.has(letter)) return;
  guessed.add(letter);

  const btn = document.getElementById('key-' + letter);
  btn.disabled = true;

  if (secretWord.includes(letter)) {
    btn.classList.add('hit');
    renderWord();
    // animate revealed letters
    const blanks = document.querySelectorAll('.blank-letter');
    blanks.forEach(b => { if (b.textContent === letter) b.classList.add('reveal'); });
    // check win
    const letters = [...secretWord].filter(c => c !== ' ');
    if (letters.every(c => guessed.has(c))) endGame(true);
  } else {
    btn.classList.add('miss');
    wrong++;
    document.getElementById('livesLeft').textContent = wrong;
    document.getElementById(PARTS[wrong-1]).style.display = 'block';
    // wrong letter chip
    const chip = document.createElement('div');
    chip.className = 'wrong-letter';
    chip.textContent = letter;
    document.getElementById('wrongRow').appendChild(chip);
    if (wrong >= 6) endGame(false);
  }
}

function endGame(win) {
  gameOver = true;
  // disable all keys
  document.querySelectorAll('.key').forEach(b => b.disabled = true);

  // reveal word if lost
  if (!win) {
    const blanks = document.querySelectorAll('.blank-letter');
    [...secretWord].filter(c=>c!==' ').forEach((ch,_) => {
      blanks.forEach(b => { if (!b.textContent) { b.textContent = ch; b.style.color='var(--red)'; } });
    });
    // simpler: just rerender with all revealed
    const row = document.getElementById('wordRow');
    row.innerHTML = '';
    for (const ch of secretWord) {
      const blank = document.createElement('div'); blank.className='blank';
      if (ch !== ' ') {
        const letter = document.createElement('div');
        letter.className = 'blank-letter';
        letter.textContent = ch;
        if (!guessed.has(ch)) letter.style.color = 'var(--red)';
        const line = document.createElement('div'); line.className='blank-line';
        blank.appendChild(letter); blank.appendChild(line);
      } else { blank.style.width='20px'; }
      row.appendChild(blank);
    }
  }

  const banner = document.getElementById('resultBanner');
  banner.style.display = 'block';
  if (win) {
    banner.classList.add('win'); banner.classList.remove('lose');
    document.getElementById('resultTitle').textContent = '🎉 You Got It!';
    document.getElementById('resultMsg').textContent = `Solved in ${wrong} wrong guess${wrong===1?'':'es'}. Well done!`;
  } else {
    banner.classList.add('lose'); banner.classList.remove('win');
    document.getElementById('resultTitle').textContent = '💀 Game Over';
    document.getElementById('resultMsg').textContent = `The word was: ${secretWord}`;
  }
}

function goSetup() {
  history.pushState({}, '', location.pathname);
  document.getElementById('screenGame').classList.remove('active');
  document.getElementById('screenSetup').classList.add('active');
  document.getElementById('linkBox').style.display = 'none';
  document.getElementById('inputWord').value = '';
  document.getElementById('hintFields').innerHTML = `<div class="hint-row"><input type="text" placeholder="Hint 1..." class="hint-input"><button class="remove-hint" onclick="removeHint(this)">×</button></div>`;
}

// keyboard support
document.addEventListener('keydown', e => {
  if (gameOver) return;
  if (/^[a-zA-Z]$/.test(e.key)) guess(e.key.toUpperCase());
});

// ── INIT ──
const params = new URLSearchParams(location.search);
const gameParam = params.get('g');
if (gameParam) {
  try {
    const data = JSON.parse(decodeURIComponent(escape(atob(gameParam))));
    initGame(data.w, data.h || []);
  } catch(e) {
    alert('Invalid link!');
  }
}
</script>
</body>
</html>
